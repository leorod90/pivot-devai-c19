<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <link rel="stylesheet" href="profile-card.css">

</head>

<body>

  <div class="card">
    <h1 id="name">Leo</h1>
    <p id="bio">I like to eat pizza</p>

    <button class="shadow-effect" onclick="updateInfo()">Update Info</button>
    <button class="shadow-effect" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    
    <div>
      <h3>About Me</h3>
      <ul>
        <li>I play video games</li>
      </ul>
    </div>
  </div>

  <script src="profile-card.js"></script>
</body>

</html>
