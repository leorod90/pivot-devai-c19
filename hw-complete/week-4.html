<!DOCTYPE html>
<html>

<head>
  <title>My Favorite Foods</title>

  <style>
    /* Page Background */
    body {
      background-color: gray;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* Main Title */
    h1 {
      text-align: center;
      color: white;
    }

    /* All paragraphs */
    p {
      color: #003049;
      line-height: 1.6;
    }

    /* Highlight class */
    .highlight {
      background-color: #fcbf49;
      padding: 10px;
      border-radius: 5px;
    }

    /* Flexbox container */
    .image-row {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      gap: 20px;
    }

    /* Food card styling */
    .food-card {
      background-color: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      flex: 1;
    }

    /* Images */
    .food-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>My Favorite Foods</h1>

  <p class="highlight">
    These are some of my favorite foods that I enjoy eating.
  </p>

  <section class="image-row">

    <div class="food-card">
      <img src="https://assets.surlatable.com/m/15a89c2d9c6c1345/72_dpi_webp-REC-283110_Pizza-jpg">
      <p>Pizza</p>
    </div>

    <div class="food-card">
      <img
        src="https://www.allrecipes.com/thmb/OJ28fIFte6Pyg93ML8IM-APbu1Y=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/AR-14554-sirloin-steak-with-garlic-butter-hero-4x3-d12fa79836754fcf850388e4677bbf55.jpg">
      <p>Steak</p>
    </div>

    <div class="food-card">
      <img src="https://tastesbetterfromscratch.com/wp-content/uploads/2014/09/Baked-Chicken-Wings-3.jpg">
      <p>Chicken Wings</p>
    </div>

  </section>

</body>

</html>
