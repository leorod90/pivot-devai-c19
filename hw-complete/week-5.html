<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Profile Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #353839;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    header {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <main class="card">
    <header>
      <h1>Profile Page</h1>
    </header>

    <section>
      <p>Enter your name:</p>
      <input type="text" id="nameInput" placeholder="Your name">
      <input type="text" id="nameInput" placeholder="Your email">

      <div>
        <button onclick="greetUser()">Say Hello</button>
        <button onclick="showInfo()">Show Info</button>
      </div>
    </section>

    <footer>
      Week 1 JavaScript Fundamentals
    </footer>
  </main>

  <script>
    // const = value does NOT change
    const appTitle = "Interactive Profile App";

    // let = value CAN change
    let userName = "";

    console.log("App loaded:", appTitle);

    // Function 1
    function greetUser() {
      userName = document.getElementById("nameInput").value;

      const greetingMessage = "Hello " + "leo" + "!";
      console.log(greetingMessage);

      alert(greetingMessage);
    }

    // Function 2
    function showInfo() {
      userName = document.getElementById("nameInput").value;

      const characterCount = userName.length;
      const infoMessage = userName + " has " + characterCount + " characters.";

      console.log(infoMessage);

      alert(infoMessage);
    }
  </script>

</body>
</html>
